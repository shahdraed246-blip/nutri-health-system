{% extends "base.html" %}

{% block title %}Edit Branch - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2>Edit Branch #{{ branch.Branch_ID }}</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="branch_name">Branch Name *</label>
            <input type="text" id="branch_name" name="branch_name" 
                   class="form-control" value="{{ branch.Branch_Name }}" required>
        </div>
        
        <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" 
                   class="form-control" value="{{ branch.City }}" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" class="form-control" rows="3">{{ branch.Address or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" name="phone" 
                   class="form-control" value="{{ branch.Phone }}" required>
        </div>
        
        <div class="form-group">
            <label for="manager_name">Branch Manager Name (text)</label>
            <input type="text" id="manager_name" name="manager_name" class="form-control" 
                   value="{{ branch.Manager_Name or '' }}" placeholder="Enter manager's full name">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">Update Branch</button>
            <a href="{{ url_for('branches') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
