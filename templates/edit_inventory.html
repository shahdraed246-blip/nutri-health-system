{% extends "base.html" %}

{% block title %}Edit Inventory - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2>Edit Inventory Item #{{ inventory.Inventory_ID }}</h2>
    </div>
    
    <form method="POST" action="{{ url_for('edit_inventory', inventory_id=inventory.Inventory_ID) }}">
        <div class="form-group">
            <label for="branch_id">Branch *</label>
            <select id="branch_id" name="branch_id" class="form-control" required>
                <option value="">-- Select Branch --</option>
                {% for branch in branches %}
                <option value="{{ branch.Branch_ID }}" 
                        {% if branch.Branch_ID == inventory.Branch_ID %}selected{% endif %}>
                    {{ branch.Branch_Name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="product_id">Product *</label>
            <select id="product_id" name="product_id" class="form-control" required>
                <option value="">-- Select Product --</option>
                {% for product in products %}
                <option value="{{ product.Product_ID }}" 
                        {% if product.Product_ID == inventory.Product_ID %}selected{% endif %}>
                    {{ product.Product_Name }} ({{ product.Category }})
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="quantity">Quantity *</label>
            <input type="number" id="quantity" name="quantity" min="0"
                   class="form-control" value="{{ inventory.Quantity }}" required>
        </div>
        
        <div class="form-group">
            <label for="entry_date">Entry Date</label>
            <input type="date" id="entry_date" name="entry_date" 
                   class="form-control" value="{{ inventory.Entry_Date }}">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">
                Update Inventory
            </button>
            <a href="{{ url_for('inventory') }}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
