{% extends "base.html" %}

{% block title %}Add Branch - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2>Add New Branch</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="branch_name">Branch Name *</label>
            <input type="text" id="branch_name" name="branch_name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" class="form-control" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" name="phone" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="manager_id">Branch Manager (Optional)</label>
            <select id="manager_id" name="manager_id" class="form-control">
                <option value="">-- Select Manager --</option>
                {% for employee in employees %}
                <option value="{{ employee.Employee_ID }}">
                    {{ employee.Employee_Name }} ({{ employee.Position }})
                </option>
                {% endfor %}
            </select>
            <small class="form-text text-muted">
                Select an existing employee to be the manager of this branch.
            </small>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-success">Add Branch</button>
            <a href="{{ url_for('branches') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
