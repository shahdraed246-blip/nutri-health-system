{% extends "base.html" %}

{% block title %}Add Employee - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="card-header">
        <h2>Add New Employee</h2>
    </div>
    
    <form method="POST" action="{{ url_for('add_employee') }}">
        <div class="form-group">
            <label for="employee_name">Employee Name *</label>
            <input type="text" id="employee_name" name="employee_name" 
                   class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="position">Position *</label>
            <select id="position" name="position" class="form-control" required>
                <option value="">-- Select Position --</option>
                <option value="Branch_Manager">Branch Manager</option>
                <option value="Nutrition_Specialist">Nutrition Specialist</option>
                <option value="Cashier">Cashier</option>
                <option value="Warehouse_Keeper">Warehouse Keeper</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="branch_id">Branch *</label>
            <select id="branch_id" name="branch_id" class="form-control" required>
                <option value="">-- Select Branch --</option>
                {% for branch in branches %}
                <option value="{{ branch.Branch_ID }}">{{ branch.Branch_Name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="salary">Salary *</label>
            <input type="number" id="salary" name="salary" step="0.01" 
                   class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" name="phone" 
                   class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" class="form-control" 
                      rows="3"></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">
                Add Employee
            </button>
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
