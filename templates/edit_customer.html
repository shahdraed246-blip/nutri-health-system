{% extends "base.html" %}

{% block title %}Edit Customer - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2>Edit Customer #{{ customer.Customer_ID }}</h2>
    </div>
    
    <form method="POST" action="{{ url_for('edit_customer', customer_id=customer.Customer_ID) }}">
        <div class="form-group">
            <label for="first_name">First Name *</label>
            <input type="text" id="first_name" name="first_name" 
                   class="form-control" value="{{ customer.Customer_FirstName }}" required>
        </div>
        
        <div class="form-group">
            <label for="last_name">Last Name *</label>
            <input type="text" id="last_name" name="last_name" 
                   class="form-control" value="{{ customer.Customer_LastName }}" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" name="phone" 
                   class="form-control" value="{{ customer.Phone }}" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" class="form-control" 
                      rows="3">{{ customer.Address }}</textarea>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">
                Update Customer
            </button>
            <a href="{{ url_for('customers') }}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
