{% extends "base.html" %}

{% block title %}Edit Product - Nutri Health{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2>Edit Product #{{ product.Product_ID }}</h2>
    </div>
    
    <form method="POST" action="{{ url_for('edit_product', product_id=product.Product_ID) }}">
        <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" name="name" 
                   class="form-control" value="{{ product.Product_Name }}" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category *</label>
            <input type="text" id="category" name="category" 
                   class="form-control" value="{{ product.Category }}" required>
        </div>
        
        <div class="form-group">
            <label for="price">Selling Price (₪) *</label>
            <input type="number" id="price" name="price" step="0.01" min="0"
                   class="form-control" value="{{ product.Price }}" required>
        </div>
        
        <div class="form-group">
            <label for="cost_price">Cost Price (₪) *</label>
            <input type="number" id="cost_price" name="cost_price" step="0.01" min="0"
                   class="form-control" value="{{ product.Cost_Price or '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="expiry_date">Expiry Date</label>
            <input type="date" id="expiry_date" name="expiry_date" 
                   class="form-control" value="{{ product.Expiry_Date or '' }}">
        </div>
        
        <div class="form-group">
            <label for="supplier_id">Supplier *</label>
            <select id="supplier_id" name="supplier_id" class="form-control" required>
                <option value="">-- Select Supplier --</option>
                {% for supplier in suppliers %}
                <option value="{{ supplier.Supplier_ID }}" 
                        {% if supplier.Supplier_ID == product.Supplier_ID %}selected{% endif %}>
                    {{ supplier.Supplier_Name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">
                Update Product
            </button>
            <a href="{{ url_for('products') }}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
